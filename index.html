<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字練習系統 - 勞校中學附屬小學</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');

        :root {
            /* 護眼 + 可愛 粉彩色系 */
            --bg-base: #e2ede1;       /* 柔和抹茶底色 */
            --bg-dots: #cadac8;       /* 背景波點色 */
            --card-bg: #fffefa;       /* 奶油白卡片，不刺眼 */
            --text-main: #5c4d43;     /* 深可可棕，取代黑色，對比柔和 */
            --text-light: #8c7b70;    /* 淺棕色 */
            --success-color: #72b076; /* 柔和草綠色 */
            --danger-color: #e57373;  /* 柔和西瓜紅 */
            --border-color: #d1d8cc;  /* 柔和邊框色 */
        }

        body {
            font-family: 'Nunito', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: var(--bg-base);
            /* 可愛的波點背景，非常淡不傷眼 */
            background-image: radial-gradient(var(--bg-dots) 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        /* 主視窗卡片 - 圓潤可愛風 */
        .container {
            background-color: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(92, 77, 67, 0.1);
            padding: 40px 50px;
            width: 90%;
            max-width: 850px;
            text-align: center;
            border: 4px solid #ffffff;
        }

        .hidden { display: none !important; }

        .hidden-input {
            position: absolute; opacity: 0; top: -1000px; left: -1000px;
        }

        h1 { 
            margin-top: 0; 
            font-size: 34px; 
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px rgba(202, 218, 200, 0.5);
        }

        /* 設定區塊 */
        .settings-group {
            margin: 20px auto 30px; 
            font-size: 18px; 
            background: #f4f6f3;
            padding: 12px 25px; 
            border-radius: 50px; 
            display: inline-flex;
            align-items: center;
            font-weight: bold;
            color: var(--text-light);
            border: 2px dashed var(--border-color);
        }

        select {
            padding: 8px 16px; font-size: 18px; border-radius: 50px;
            border: 2px solid var(--border-color); outline: none; margin-left: 15px; 
            cursor: pointer; background-color: #fff; font-weight: bold;
            color: var(--text-main); transition: all 0.2s;
        }

        select:focus { border-color: #a3b899; }

        /* 按鈕網格 */
        .button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; margin-top: 10px;
        }

        /* 玩具按鈕特效設計 */
        .btn {
            padding: 18px 10px; font-size: 18px; font-weight: 800;
            color: var(--text-main); /* 統一使用柔和深棕色文字 */
            border: 2px solid rgba(255, 255, 255, 0.5); 
            border-radius: 20px; 
            cursor: pointer;
            transition: all 0.1s ease; /* 按下反應要快 */
            /* 做出立體厚度 */
            box-shadow: 0 6px 0px rgba(92, 77, 67, 0.15), 0 10px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        /* 按下按鈕時的物理下壓效果 */
        .btn:active { 
            transform: translateY(6px); 
            box-shadow: 0 0px 0px rgba(92, 77, 67, 0.15), 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 護眼粉彩馬卡龍色系 */
        .btn-cangjie { background-color: #b5e48c; }  /* 嫩草綠 */
        .btn-philosophy { background-color: #a2d2ff; } /* 寶寶藍 */
        .btn-strokes { background-color: #cdb4db; }   /* 柔芋紫 */
        .btn-body { background-color: #ffc8dd; }      /* 櫻花粉 */
        .btn-fonts { background-color: #ffafcc; }     /* 蜜桃粉 */
        .btn-ph_st { background-color: #fcf6bd; }     /* 奶油黃 */
        .btn-bo_fo { background-color: #ffd6a5; }     /* 哈密瓜橘 */
        .btn-all { background-color: #ffadad; }       /* 柔和珊瑚紅 */

        .btn-return {
            background-color: #e0e6dd; border-color: transparent;
            color: var(--text-light); margin-top: 30px;
            padding: 14px 35px; width: auto; border-radius: 50px;
            box-shadow: 0 5px 0px rgba(92, 77, 67, 0.1);
        }
        .btn-return:active { transform: translateY(5px); box-shadow: 0 0px 0px rgba(92, 77, 67, 0.1); }

        /* 遊戲狀態列 */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #f4f6f3; padding: 15px 30px;
            border-radius: 20px; margin-bottom: 25px;
            font-size: 20px; font-weight: 800;
            color: var(--text-main); border: 2px dashed var(--border-color);
        }

        .status-box { 
            background: #fff; padding: 5px 18px; 
            border-radius: 12px; 
            box-shadow: 0 2px 0px rgba(92, 77, 67, 0.05); 
        }

        .timer-red { color: var(--danger-color); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 顯示區設計 (可愛字卡感) */
        .display-card {
            width: 100%; height: 350px; 
            border-radius: 24px;
            margin-bottom: 20px; 
            background-color: #fcfdfe;
            border: 4px solid #eef1ec;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }

        #image-display { object-fit: contain; padding: 15px; box-sizing: border-box; }
        
        #char-display {
            display: flex; justify-content: center; align-items: center;
            font-size: 160px; font-weight: 800; color: var(--text-main);
            background-image: linear-gradient(#f4f6f3 2px, transparent 2px);
            background-size: 100% 40px; /* 像練習簿的橫線 */
            background-position: 0 20px;
        }

        .feedback { height: 40px; font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        .feedback.correct { color: var(--success-color); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feedback.wrong { color: var(--danger-color); animation: shake 0.4s ease; }
        
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

        .hint-text { 
            color: var(--text-light); font-size: 16px; margin-bottom: 15px; 
            font-weight: bold; background: #f4f6f3; 
            display: inline-block; padding: 8px 20px; 
            border-radius: 50px; border: 2px solid #fff;
        }

        /* 作者簽名檔 */
        .author-signature {
            position: fixed; bottom: 20px; right: 25px; text-align: right;
            font-size: 16px; font-weight: 800; color: var(--text-light);
            letter-spacing: 1.5px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 10px 20px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(92, 77, 67, 0.05); line-height: 1.6; z-index: 1000;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="menu-screen">
            <h1>🌿 中文打字練習系統 🐾</h1>
            
            <div class="settings-group">
                <label for="time-select">⏱️ 練習時間：</label>
                <select id="time-select">
                    <option value="180">3 分鐘</option>
                    <option value="300">5 分鐘</option>
                </select>
            </div>

            <div class="button-grid">
                <button class="btn btn-cangjie" onclick="startGame('cangjie')">倉頡碼字根</button>
                <button class="btn btn-philosophy" onclick="startGame('philosophy')">哲理類 (A-G)</button>
                <button class="btn btn-strokes" onclick="startGame('strokes')">筆劃類 (H-N)</button>
                <button class="btn btn-body" onclick="startGame('body')">人身類 (O-R)</button>
                <button class="btn btn-fonts" onclick="startGame('fonts')">字型類 (S-Y)</button>
                <button class="btn btn-ph_st" onclick="startGame('ph_st')">哲理+筆劃 (A-N)</button>
                <button class="btn btn-bo_fo" onclick="startGame('bo_fo')">人身+字型 (O-Y)</button>
                <button class="btn btn-all" onclick="startGame('all')">全輔助 (A-Z)</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <input type="text" id="mobile-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            
            <div class="status-bar">
                <div id="category-title" class="status-box">類別</div>
                <div>倒數 <span id="timer" class="status-box">00:00</span></div>
                <div>得分 <span id="score" class="status-box" style="color: #72b076;">0</span></div>
            </div>

            <div id="char-display" class="display-card hidden"></div>
            <img id="image-display" class="display-card" src="" alt="圖片載入中...">
            
            <div id="feedback" class="feedback"></div>
            <div class="hint-text" id="hint-text">請輸入對應的英文字母</div>
            <br>
            <button class="btn btn-return" onclick="returnToMenu()">🔙 結束並返回主選單</button>
        </div>
    </div>

    <div class="author-signature">
        勞校中學附屬小學<br>
        作者: 賀老師
    </div>

    <script>
        const counts = {
            'a': 19, 'b': 21, 'c': 18, 'd': 21, 'e': 19, 'f': 22, 'g': 20,
            'h': 22, 'i': 22, 'j': 21, 'k': 23, 'l': 21, 'm': 22, 'n': 22,
            'o': 22, 'p': 21, 'q': 19, 'r': 21,
            's': 21, 't': 22, 'u': 18, 'v': 20, 'w': 18, 'x': 1, 'y': 21, 'z': 1
        };

        const cangjieMap = [
            { char: '日', key: 'a' }, { char: '月', key: 'b' }, { char: '金', key: 'c' },
            { char: '木', key: 'd' }, { char: '水', key: 'e' }, { char: '火', key: 'f' },
            { char: '土', key: 'g' }, { char: '竹', key: 'h' }, { char: '戈', key: 'i' },
            { char: '十', key: 'j' }, { char: '大', key: 'k' }, { char: '中', key: 'l' },
            { char: '一', key: 'm' }, { char: '弓', key: 'n' }, { char: '人', key: 'o' },
            { char: '心', key: 'p' }, { char: '手', key: 'q' }, { char: '口', key: 'r' },
            { char: '尸', key: 's' }, { char: '廿', key: 't' }, { char: '山', key: 'u' },
            { char: '女', key: 'v' }, { char: '田', key: 'w' }, { char: '卜', key: 'y' }
        ];

        function getLetters(startChar, endChar) {
            let result = [];
            for (let i = startChar.charCodeAt(0); i <= endChar.charCodeAt(0); i++) {
                result.push(String.fromCharCode(i));
            }
            return result;
        }

        function getFolderName(letter) {
            if (letter >= 'a' && letter <= 'g') return 'philosophy';
            if (letter >= 'h' && letter <= 'n') return 'strokes';
            if (letter >= 'o' && letter <= 'r') return 'body';
            if (letter >= 's' && letter <= 'z') return 'fonts';
            return '';
        }

        const categoryMap = {
            'cangjie':    { title: '倉頡碼字根', isTextMode: true },
            'philosophy': { title: '哲理類 (A-G)',     letters: getLetters('a', 'g') },
            'strokes':    { title: '筆劃類 (H-N)',     letters: getLetters('h', 'n') },
            'body':       { title: '人身類 (O-R)',     letters: getLetters('o', 'r') },
            'fonts':      { title: '字型類 (S-Y)',     letters: getLetters('s', 'y') },
            'ph_st':      { title: '哲理+筆劃 (A-N)', letters: getLetters('a', 'n') },
            'bo_fo':      { title: '人身+字型 (O-Y)', letters: getLetters('o', 'y') },
            'all':        { title: '全輔助 (A-Z)',     letters: getLetters('a', 'z') }
        };

        let currentImageList = [];
        let currentScore = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let isPlaying = false;
        let currentTargetKey = "";
        let currentErrorCount = 0; 
        let currentModeIsText = false;
        const mobileInput = document.getElementById('mobile-input');

        function startGame(categoryId) {
            const category = categoryMap[categoryId];
            currentModeIsText = category.isTextMode === true;
            currentImageList = [];

            if (currentModeIsText) {
                currentImageList = [...cangjieMap];
                document.getElementById('hint-text').innerText = `💡 請輸入上方字根對應的英文字母`;
                document.getElementById('image-display').classList.add('hidden');
                document.getElementById('char-display').classList.remove('hidden');
            } else {
                const currentValidLetters = category.letters;
                currentValidLetters.forEach(letter => {
                    const limit = counts[letter];
                    const folder = getFolderName(letter); 
                    for (let i = 1; i <= limit; i++) {
                        currentImageList.push({ key: letter, index: i, folder: folder });
                    }
                });
                
                const hintStart = currentValidLetters[0].toUpperCase();
                const hintEnd = currentValidLetters[currentValidLetters.length - 1].toUpperCase();
                document.getElementById('hint-text').innerText = `💡 請輸入圖片對應的英文字母 (範圍：${hintStart} - ${hintEnd})`;
                document.getElementById('char-display').classList.add('hidden');
                document.getElementById('image-display').classList.remove('hidden');
            }

            if (currentImageList.length === 0) {
                alert("找不到對應的題目設定！");
                return;
            }

            currentScore = 0;
            isPlaying = true;
            timeLeft = parseInt(document.getElementById('time-select').value);
            
            document.getElementById('category-title').innerText = category.title;
            document.getElementById('score').innerText = currentScore;
            
            const feedbackElement = document.getElementById('feedback');
            feedbackElement.innerText = "準備開始！";
            feedbackElement.className = "feedback"; 
            
            document.getElementById('timer').classList.remove('timer-red'); 
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            mobileInput.value = '';
            mobileInput.focus();

            updateTimerUI();
            nextImage();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextImage() {
            if (!isPlaying || currentImageList.length === 0) return;
            const randomItem = currentImageList[Math.floor(Math.random() * currentImageList.length)];
            
            if (currentModeIsText) {
                document.getElementById('char-display').innerText = randomItem.char;
                currentTargetKey = randomItem.key;
            } else {
                const imgElement = document.getElementById('image-display');
                imgElement.onerror = null; 
                imgElement.src = `PIC/${randomItem.folder}/${randomItem.key} (${randomItem.index}).png`;
                currentTargetKey = randomItem.key;
            }
            currentErrorCount = 0;
        }

        function updateTimerUI() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerElement = document.getElementById('timer');
            timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 10 && timeLeft > 0) timerElement.classList.add('timer-red');
            else timerElement.classList.remove('timer-red');
        }

        function processInput(keyPressed) {
            const feedbackElement = document.getElementById('feedback');
            
            feedbackElement.classList.remove('correct', 'wrong');
            void feedbackElement.offsetWidth; 
            
            if (keyPressed === currentTargetKey) {
                currentScore += 1;
                feedbackElement.innerText = "🌟 答對了！ (+1)";
                feedbackElement.classList.add('correct');
                nextImage(); 
            } else {
                currentScore -= 2;
                currentErrorCount += 1;
                if (currentErrorCount >= 3) {
                    feedbackElement.innerText = "💦 錯滿 3 次，自動跳過 (-2)";
                    feedbackElement.classList.add('wrong');
                    nextImage(); 
                } else {
                    feedbackElement.innerText = `💦 哎呀，錯了 (-2) (已錯 ${currentErrorCount}/3 次)`;
                    feedbackElement.classList.add('wrong');
                }
            }
            document.getElementById('score').innerText = currentScore;
        }

        window.addEventListener('keydown', (event) => {
            if (!isPlaying || event.repeat) return;
            if (event.target.id === 'mobile-input') return;

            const keyPressed = event.key.toLowerCase();
            if (/^[a-z]$/.test(keyPressed)) {
                processInput(keyPressed);
            }
        });

        mobileInput.addEventListener('keydown', (event) => {
            if (event.repeat) {
                event.preventDefault(); 
            }
        });

        mobileInput.addEventListener('input', (event) => {
            if (!isPlaying) return;
            const keyPressed = event.data ? event.data.toLowerCase() : "";
            mobileInput.value = ''; 
            
            if (keyPressed && /^[a-z]$/.test(keyPressed)) {
                processInput(keyPressed);
            }
        });

        document.getElementById('game-screen').addEventListener('click', () => {
            if (isPlaying) {
                mobileInput.focus();
            }
        });

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            mobileInput.blur(); 
            alert(`⏰ 時間到！\n\n🎯 您的最終得分為：${currentScore} 分\n太棒了，繼續加油喔！`);
            returnToMenu();
        }

        function returnToMenu() {
            isPlaying = false;
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
