<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字練習系統 - 勞校中學附屬小學</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');

        :root {
            --bg-base: #e2ede1;
            --bg-dots: #cadac8;
            --card-bg: #fffefa;
            --text-main: #5c4d43;
            --text-light: #8c7b70;
            --success-color: #72b076;
            --danger-color: #e57373;
            --border-color: #d1d8cc;
            --modal-overlay: rgba(92, 77, 67, 0.6);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Nunito', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(var(--bg-dots) 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(92, 77, 67, 0.1);
            padding: 30px 40px;
            width: 90%;
            max-width: 850px;
            text-align: center;
            border: 4px solid #ffffff;
            position: relative;
        }

        .hidden { display: none !important; }
        .hidden-input { position: absolute; opacity: 0; top: -1000px; left: -1000px; }

        h1 { 
            margin-top: 0; font-size: 34px; font-weight: 800;
            color: var(--text-main); letter-spacing: 2px;
            margin-bottom: 20px; text-shadow: 2px 2px 0px rgba(202, 218, 200, 0.5);
        }

        .student-badge {
            position: absolute; top: 20px; left: 20px; background: #fff;
            padding: 8px 15px; border-radius: 20px; font-size: 16px;
            font-weight: bold; color: var(--text-main); border: 2px dashed var(--border-color);
            display: none; z-index: 10;
        }

        .controls-wrapper { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px auto 25px; flex-wrap: wrap; }
        .settings-group { font-size: 18px; background: #f4f6f3; padding: 10px 20px; border-radius: 50px; display: inline-flex; align-items: center; font-weight: bold; color: var(--text-light); border: 2px dashed var(--border-color); }
        select { padding: 6px 14px; font-size: 18px; border-radius: 50px; border: 2px solid var(--border-color); outline: none; margin-left: 10px; cursor: pointer; background-color: #fff; font-weight: bold; color: var(--text-main); transition: all 0.2s; }
        select:focus { border-color: #a3b899; }

        .btn-leaderboard {
            background-color: #ffd6a5; color: var(--text-main); padding: 10px 20px;
            font-size: 18px; font-weight: 800; border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px; cursor: pointer; box-shadow: 0 5px 0px rgba(92, 77, 67, 0.15);
            transition: all 0.1s ease; display: flex; align-items: center; gap: 8px; height: 100%;
        }
        .btn-leaderboard:active { transform: translateY(4px); box-shadow: 0 1px 0px rgba(92, 77, 67, 0.15); }

        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .btn { padding: 15px 10px; font-size: 18px; font-weight: 800; color: var(--text-main); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 20px; cursor: pointer; transition: all 0.1s ease; box-shadow: 0 6px 0px rgba(92, 77, 67, 0.15), 0 10px 15px rgba(0,0,0,0.05); position: relative; }
        .btn:active { transform: translateY(6px); box-shadow: 0 0px 0px rgba(92, 77, 67, 0.15), 0 2px 5px rgba(0,0,0,0.05); }

        .btn-cangjie { background-color: #b5e48c; }
        .btn-philosophy { background-color: #a2d2ff; }
        .btn-strokes { background-color: #cdb4db; }
        .btn-body { background-color: #ffc8dd; }
        .btn-fonts { background-color: #ffafcc; }
        .btn-ph_st { background-color: #fcf6bd; }
        .btn-bo_fo { background-color: #ffd6a5; }
        .btn-all { background-color: #ffadad; }
        .btn-english { background-color: #9bf6ff; grid-column: span 2; font-size: 20px; } 
        
        .btn-return { background-color: #e0e6dd; border-color: transparent; color: var(--text-light); margin-top: 15px; padding: 12px 30px; width: auto; border-radius: 50px; box-shadow: 0 5px 0px rgba(92, 77, 67, 0.1); }
        .btn-return:active { transform: translateY(5px); box-shadow: 0 0px 0px rgba(92, 77, 67, 0.1); }

        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f6f3; padding: 10px 25px; border-radius: 20px; margin-bottom: 15px; font-size: 20px; font-weight: 800; color: var(--text-main); border: 2px dashed var(--border-color); }
        .status-box { background: #fff; padding: 5px 18px; border-radius: 12px; box-shadow: 0 2px 0px rgba(92, 77, 67, 0.05); }
        .timer-red { color: var(--danger-color); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 高度調整為400px，進一步增加下落距離，降低難度 */
        .display-card { width: 100%; height: 400px; border-radius: 24px; margin-bottom: 10px; background-color: #fcfdfe; border: 4px solid #eef1ec; box-shadow: inset 0 0 20px rgba(0,0,0,0.02); }
        #image-display { object-fit: contain; padding: 15px; box-sizing: border-box; }
        #char-display { display: flex; justify-content: center; align-items: center; font-size: 140px; font-weight: 800; color: var(--text-main); background-image: linear-gradient(#f4f6f3 2px, transparent 2px); background-size: 100% 40px; background-position: 0 20px; }
        
        #falling-container { position: relative; overflow: hidden; background-image: linear-gradient(#f4f6f3 2px, transparent 2px); background-size: 100% 40px; }
        .falling-letter { position: absolute; font-size: 80px; font-weight: 800; color: var(--text-main); text-shadow: 3px 3px 0px rgba(202, 218, 200, 0.6); width: 80px; height: 80px; text-align: center; line-height: 80px; transform: translateX(-50%); }

        /* ======== 虛擬鍵盤與動態雙手樣式 (縮小40%版) ======== */
        .keyboard-container {
            display: flex; flex-direction: column; gap: 3px; align-items: center; 
            background: #f4f6f3; padding: 8px; border-radius: 12px; 
            border: 2px dashed var(--border-color); margin-bottom: 5px;
        }
        .key-row { display: flex; gap: 3px; justify-content: center; }
        .key {
            width: 16px; height: 16px; border-radius: 4px; display: flex; 
            justify-content: center; align-items: center; font-weight: 900; 
            font-size: 8px; color: var(--text-main); box-shadow: 0 1px 0 rgba(0,0,0,0.1);
            transition: all 0.15s ease; border: 1px solid rgba(255,255,255,0.6);
        }
        
        /* 指法對應顏色 (馬卡龍色系) */
        .lp { background-color: #ffadad; } /* 粉紅-左小指 */
        .lr { background-color: #ffd6a5; } /* 橙色-左無名指 */
        .lm { background-color: #fdffb6; } /* 黃色-左中指 */
        .li { background-color: #caffbf; } /* 綠色-左食指 */
        .ri { background-color: #9bf6ff; } /* 淺藍-右食指 */
        .rm { background-color: #a0c4ff; } /* 藍色-右中指 */
        .rr { background-color: #bdb2ff; } /* 紫色-右無名指 */
        .rp { background-color: #ffc6ff; } /* 淺紫-右小指 */
        .thumb-color { background-color: #e2ede1; } /* 拇指-中性色 */
        
        /* 教學亮起特效 (鍵盤) */
        .key.active-key {
            transform: scale(1.15) translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2), 0 0 0 1px #fff, 0 0 0 2px var(--danger-color);
            z-index: 10; color: #fff; background-color: var(--danger-color) !important;
        }

        /* 動態雙手圖形 (縮小40%版) */
        .hands-container {
            display: flex; justify-content: center; gap: 30px; margin-top: 15px;
        }
        .hand {
            position: relative; width: 44px; height: 21px; background: #fff;
            border-radius: 8px 8px 18px 18px; border: 1px solid #d1d8cc;
            box-shadow: inset -1px -2px 3px rgba(0,0,0,0.03), 0 2px 0 rgba(0,0,0,0.05);
        }
        .fingers {
            display: flex; align-items: flex-end; gap: 2px; position: absolute;
            bottom: 19px; left: 50%; transform: translateX(-50%);
        }
        .finger {
            width: 8px; border-radius: 5px 5px 0 0; border: 1px solid #d1d8cc;
            border-bottom: none; transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom center; box-shadow: inset -1px 0 2px rgba(0,0,0,0.05);
        }
        
        /* 手指高度比例 */
        .finger.pinky { height: 13px; }
        .finger.ring { height: 19px; }
        .finger.middle { height: 23px; }
        .finger.index { height: 19px; }
        
        /* 拇指特化 */
        .finger.thumb {
            position: absolute; width: 10px; height: 16px; border-radius: 5px 5px 0 0;
            border: 1px solid #d1d8cc; bottom: 2px; box-shadow: inset -1px 0 2px rgba(0,0,0,0.05);
        }
        .left-hand .finger.thumb { right: -8px; transform: rotate(50deg); }
        .right-hand .finger.thumb { left: -8px; transform: rotate(-50deg); }

        /* 教學亮起特效 (手指) */
        .finger.active-finger {
            transform: translateY(-4px) scale(1.05);
            border-color: var(--danger-color); z-index: 10;
            background-color: var(--danger-color) !important;
            box-shadow: 0 2px 5px rgba(229, 115, 115, 0.4);
        }
        .left-hand .finger.thumb.active-finger { transform: rotate(50deg) translateY(-4px) scale(1.05); }
        .right-hand .finger.thumb.active-finger { transform: rotate(-50deg) translateY(-4px) scale(1.05); }
        /* ========================================= */

        .feedback { height: 35px; font-size: 24px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px; }
        .feedback.correct { color: var(--success-color); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feedback.wrong { color: var(--danger-color); animation: shake 0.4s ease; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

        .hint-text { color: var(--text-light); font-size: 16px; margin-bottom: 10px; font-weight: bold; background: #f4f6f3; display: inline-block; padding: 6px 20px; border-radius: 50px; border: 2px solid #fff; }
        
        .author-signature { 
            position: fixed; bottom: 15px; right: 20px; text-align: right; 
            font-size: 10px; font-weight: 800; color: var(--text-light); letter-spacing: 1px; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); 
            padding: 6px 12px; border-radius: 10px; box-shadow: 0 2px 10px rgba(92, 77, 67, 0.05); 
            line-height: 1.4; z-index: 100; border: 2px solid #fff; 
        }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--modal-overlay); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background-color: var(--card-bg); border-radius: 30px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; border: 4px solid #fff; transform: translateY(20px); transition: all 0.3s ease; position: relative; }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .login-input { width: 80%; padding: 15px; font-size: 24px; text-align: center; border: 3px solid var(--border-color); border-radius: 15px; margin: 20px 0; color: var(--text-main); font-weight: bold; text-transform: uppercase; outline: none; }
        .login-input:focus { border-color: #a3b899; }
        .login-hint { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
        .btn-primary { background-color: #a3b899; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: 800; box-shadow: 0 5px 0px rgba(0,0,0,0.1); transition: all 0.1s; }
        .btn-primary:active { transform: translateY(4px); box-shadow: 0 1px 0px rgba(0,0,0,0.1); }
        .error-message { color: var(--danger-color); font-weight: bold; margin-bottom: 15px; min-height: 24px; }

        .leaderboard-modal { max-width: 650px; max-height: 85vh; display: flex; flex-direction: column; }
        .leaderboard-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .table-container { overflow-y: auto; max-height: 50vh; border-radius: 15px; border: 2px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background-color: #f4f6f3; padding: 15px; color: var(--text-light); position: sticky; top: 0; z-index: 2; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; font-size: 18px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fcfdfc; }
        .rank-1 td:first-child { color: var(--gold); font-size: 24px; }
        .rank-2 td:first-child { color: var(--silver); font-size: 22px; }
        .rank-3 td:first-child { color: var(--bronze); font-size: 20px; }
        .btn-close { position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; color: var(--text-light); cursor: pointer; font-weight: bold; padding: 0; line-height: 1; }
        .btn-close:hover { color: var(--danger-color); }
        .score-highlight { font-size: 64px; color: var(--success-color); font-weight: 900; margin: 20px 0; text-shadow: 2px 2px 0px rgba(114, 176, 118, 0.2); }
    </style>
</head>
<body>

    <div class="student-badge" id="student-badge">🧑‍🎓 學號: <span id="display-student-id">未登入</span></div>

    <div class="container">
        <div id="menu-screen">
            <h1>🌿 打字練習系統 🐾</h1>
            
            <div class="controls-wrapper">
                <div class="settings-group">
                    <label for="practice-mode-select">模式：</label>
                    <select id="practice-mode-select">
                        <option value="practice">練習模式</option>
                        <option value="test">測驗模式</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label for="time-select">⏱️ 練習時間：</label>
                    <select id="time-select">
                        <option value="180">3 分鐘</option>
                        <option value="300">5 分鐘</option>
                    </select>
                </div>
                <button class="btn-leaderboard" onclick="openLeaderboard()">
                    🏆 龍虎榜
                </button>
            </div>

            <div class="button-grid">
                <button class="btn btn-cangjie" onclick="startGame('cangjie')">倉頡碼字根</button>
                <button class="btn btn-philosophy" onclick="startGame('philosophy')">哲理類 (A-G)</button>
                <button class="btn btn-strokes" onclick="startGame('strokes')">筆劃類 (H-N)</button>
                <button class="btn btn-body" onclick="startGame('body')">人身類 (O-R)</button>
                <button class="btn btn-fonts" onclick="startGame('fonts')">字型類 (S-Y)</button>
                <button class="btn btn-ph_st" onclick="startGame('ph_st')">哲理+筆劃 (A-N)</button>
                <button class="btn btn-bo_fo" onclick="startGame('bo_fo')">人身+字型 (O-Y)</button>
                <button class="btn btn-all" onclick="startGame('all')">全輔助 (A-Z)</button>
                <button class="btn btn-english" onclick="startGame('english')">英文打字 (A-Z)</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <input type="text" id="mobile-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            
            <div class="status-bar">
                <div id="category-title" class="status-box">類別</div>
                <div>倒數 <span id="timer" class="status-box">00:00</span></div>
                <div>得分 <span id="score" class="status-box" style="color: #72b076;">0</span></div>
            </div>

            <div id="char-display" class="display-card hidden"></div>
            <img id="image-display" class="display-card" src="" alt="圖片載入中...">
            
            <div id="falling-container" class="display-card hidden">
                <div id="the-falling-letter" class="falling-letter">A</div>
            </div>
            
            <!-- 新增：動態指法鍵位圖 + 雙手圖形 -->
            <div id="keyboard-layout" class="keyboard-container hidden">
                <!-- 鍵盤區 -->
                <div class="key-row">
                    <div class="key lp" id="key-q">Q</div>
                    <div class="key lr" id="key-w">W</div>
                    <div class="key lm" id="key-e">E</div>
                    <div class="key li" id="key-r">R</div>
                    <div class="key li" id="key-t">T</div>
                    <div class="key ri" id="key-y">Y</div>
                    <div class="key ri" id="key-u">U</div>
                    <div class="key rm" id="key-i">I</div>
                    <div class="key rr" id="key-o">O</div>
                    <div class="key rp" id="key-p">P</div>
                </div>
                <div class="key-row">
                    <div class="key lp" id="key-a">A</div>
                    <div class="key lr" id="key-s">S</div>
                    <div class="key lm" id="key-d">D</div>
                    <div class="key li" id="key-f">F</div>
                    <div class="key li" id="key-g">G</div>
                    <div class="key ri" id="key-h">H</div>
                    <div class="key ri" id="key-j">J</div>
                    <div class="key rm" id="key-k">K</div>
                    <div class="key rr" id="key-l">L</div>
                </div>
                <div class="key-row">
                    <div class="key lp" id="key-z">Z</div>
                    <div class="key lr" id="key-x">X</div>
                    <div class="key lm" id="key-c">C</div>
                    <div class="key li" id="key-v">V</div>
                    <div class="key li" id="key-b">B</div>
                    <div class="key ri" id="key-n">N</div>
                    <div class="key ri" id="key-m">M</div>
                </div>

                <!-- 動態 3D 雙手區 (美化版) -->
                <div class="hands-container">
                    <!-- 左手 -->
                    <div class="hand left-hand">
                        <div class="fingers">
                            <div class="finger pinky lp" id="finger-lp"></div>
                            <div class="finger ring lr" id="finger-lr"></div>
                            <div class="finger middle lm" id="finger-lm"></div>
                            <div class="finger index li" id="finger-li"></div>
                        </div>
                        <div class="finger thumb thumb-color" id="finger-lt"></div>
                    </div>
                    <!-- 右手 -->
                    <div class="hand right-hand">
                        <div class="finger thumb thumb-color" id="finger-rt"></div>
                        <div class="fingers">
                            <div class="finger index ri" id="finger-ri"></div>
                            <div class="finger middle rm" id="finger-rm"></div>
                            <div class="finger ring rr" id="finger-rr"></div>
                            <div class="finger pinky rp" id="finger-rp"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="feedback" class="feedback"></div>
            <div class="hint-text" id="hint-text">請輸入對應的英文字母</div>
            <br>
            <button class="btn btn-return" onclick="returnToMenu()">🔙 結束並返回主選單</button>
        </div>
    </div>

    <div class="author-signature">
        勞校中學附屬小學<br>
        作者: 賀老師
    </div>

    <!-- 1. 學生登入 Modal -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <h1>👋 歡迎來到打字系統</h1>
            <p style="font-size: 18px; color: var(--text-main); font-weight: bold;">請先輸入您的專屬學號</p>
            <input type="text" id="student-id-input" class="login-input" placeholder="例如: P6A02" maxlength="5">
            <div class="login-hint">格式說明: P + 年級(1-6) + 班別(A-F) + 學號(01-40)</div>
            <div class="error-message" id="login-error"></div>
            <button class="btn-primary" onclick="verifyLogin()">進入系統</button>
        </div>
    </div>

    <!-- 2. 龍虎榜 Modal -->
    <div class="modal-overlay" id="leaderboard-modal">
        <div class="modal-content leaderboard-modal">
            <button class="btn-close" onclick="closeLeaderboard()">×</button>
            <h1 style="margin-bottom: 10px;">🏆 勞校龍虎榜</h1>
            
            <div class="leaderboard-controls">
                <select id="lb-mode-select" onchange="loadLeaderboard()">
                    <option value="倉頡碼字根">倉頡碼字根</option>
                    <option value="哲理類 (A-G)">哲理類 (A-G)</option>
                    <option value="筆劃類 (H-N)">筆劃類 (H-N)</option>
                    <option value="人身類 (O-R)">人身類 (O-R)</option>
                    <option value="字型類 (S-Y)">字型類 (S-Y)</option>
                    <option value="哲理+筆劃 (A-N)">哲理+筆劃 (A-N)</option>
                    <option value="人身+字型 (O-Y)">人身+字型 (O-Y)</option>
                    <option value="全輔助 (A-Z)">全輔助 (A-Z)</option>
                    <option value="英文打字 (A-Z)">英文打字 (A-Z)</option>
                </select>
                <select id="lb-time-select" onchange="loadLeaderboard()">
                    <option value="180">3 分鐘</option>
                    <option value="300">5 分鐘</option>
                </select>
            </div>

            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th width="20%">排名</th>
                            <th width="50%">學號</th>
                            <th width="30%">最高分</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- 資料由 JS 動態生成 -->
                    </tbody>
                </table>
                <div id="lb-loading" style="padding: 20px; font-weight: bold; color: var(--text-light);">載入中...</div>
            </div>
        </div>
    </div>

    <!-- 3. 遊戲結算 Modal -->
    <div class="modal-overlay" id="game-over-modal">
        <div class="modal-content">
            <h1>⏰ 時間到！</h1>
            <p style="font-size: 20px; font-weight: bold; margin-top: 10px;">您的最終得分為：</p>
            <div class="score-highlight" id="final-score">0</div>
            <p style="color: var(--text-light); margin-bottom: 25px;" id="save-status">成績處理中...</p>
            <button class="btn-primary" onclick="closeGameOver()">太棒了，繼續加油</button>
        </div>
    </div>

    <script>
        // ==========================================
        const LEADERBOARD_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8k9zHam8zzhz4HyZeg69R2WlOYNW9zmGGV0Thr9JE47QhtYoMvA2pPRHtIFTUahgMGQ/exec";
        const TEST_SCORE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHo2Y18VkjCziSZ5P8Wv5O8Tt70tAKLY0lqYarj-GczZqIvOqeB5URhr9Ef899ma1O/exec";
        const APP_SCRIPT_PLACEHOLDER = "在此貼上您的_Google_Apps_Script_網址";
        // ==========================================

        const counts = {
            'a': 19, 'b': 21, 'c': 18, 'd': 21, 'e': 19, 'f': 22, 'g': 20,
            'h': 22, 'i': 22, 'j': 21, 'k': 23, 'l': 21, 'm': 22, 'n': 22,
            'o': 22, 'p': 21, 'q': 19, 'r': 21,
            's': 21, 't': 22, 'u': 18, 'v': 20, 'w': 18, 'x': 1, 'y': 21, 'z': 1
        };

        const cangjieMap = [
            { char: '日', key: 'a' }, { char: '月', key: 'b' }, { char: '金', key: 'c' },
            { char: '木', key: 'd' }, { char: '水', key: 'e' }, { char: '火', key: 'f' },
            { char: '土', key: 'g' }, { char: '竹', key: 'h' }, { char: '戈', key: 'i' },
            { char: '十', key: 'j' }, { char: '大', key: 'k' }, { char: '中', key: 'l' },
            { char: '一', key: 'm' }, { char: '弓', key: 'n' }, { char: '人', key: 'o' },
            { char: '心', key: 'p' }, { char: '手', key: 'q' }, { char: '口', key: 'r' },
            { char: '尸', key: 's' }, { char: '廿', key: 't' }, { char: '山', key: 'u' },
            { char: '女', key: 'v' }, { char: '田', key: 'w' }, { char: '卜', key: 'y' }
        ];

        // 定義每個字母對應的手指 ID
        const fingerMapping = {
            'q': 'lp', 'a': 'lp', 'z': 'lp',
            'w': 'lr', 's': 'lr', 'x': 'lr',
            'e': 'lm', 'd': 'lm', 'c': 'lm',
            'r': 'li', 'f': 'li', 'v': 'li', 't': 'li', 'g': 'li', 'b': 'li',
            'y': 'ri', 'h': 'ri', 'n': 'ri', 'u': 'ri', 'j': 'ri', 'm': 'ri',
            'i': 'rm', 'k': 'rm',
            'o': 'rr', 'l': 'rr',
            'p': 'rp'
        };

        function getLetters(startChar, endChar) {
            let result = [];
            for (let i = startChar.charCodeAt(0); i <= endChar.charCodeAt(0); i++) {
                result.push(String.fromCharCode(i));
            }
            return result;
        }

        function getFolderName(letter) {
            if (letter >= 'a' && letter <= 'g') return 'philosophy';
            if (letter >= 'h' && letter <= 'n') return 'strokes';
            if (letter >= 'o' && letter <= 'r') return 'body';
            if (letter >= 's' && letter <= 'z') return 'fonts';
            return '';
        }

        const categoryMap = {
            'cangjie':    { title: '倉頡碼字根', isTextMode: true },
            'philosophy': { title: '哲理類 (A-G)',     letters: getLetters('a', 'g') },
            'strokes':    { title: '筆劃類 (H-N)',     letters: getLetters('h', 'n') },
            'body':       { title: '人身類 (O-R)',     letters: getLetters('o', 'r') },
            'fonts':      { title: '字型類 (S-Y)',     letters: getLetters('s', 'y') },
            'ph_st':      { title: '哲理+筆劃 (A-N)', letters: getLetters('a', 'n') },
            'bo_fo':      { title: '人身+字型 (O-Y)', letters: getLetters('o', 'y') },
            'all':        { title: '全輔助 (A-Z)',     letters: getLetters('a', 'z') },
            'english':    { title: '英文打字 (A-Z)',   letters: getLetters('a', 'z'), isFallingMode: true }
        };

        let studentId = "";
        let currentModeId = "";
        let selectedTime = 180;
        let currentPracticeMode = "practice";
        let currentImageList = [];
        let currentScore = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let isPlaying = false;
        let currentTargetKey = "";
        let currentErrorCount = 0; 
        
        let currentModeIsText = false;
        let currentModeIsFalling = false;
        let animationFrameId = null;
        let fallingY = 0;

        const mobileInput = document.getElementById('mobile-input');

        function isPlaceholderUrl(url) {
            return !url || url === APP_SCRIPT_PLACEHOLDER;
        }

        async function postToAppScript(url, payload) {
            const formData = new URLSearchParams();
            Object.entries(payload).forEach(([key, value]) => {
                formData.append(key, value);
            });

            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });

            const rawText = await response.text();

            let result;
            try {
                result = JSON.parse(rawText);
            } catch (error) {
                throw new Error(`伺服器沒有回傳 JSON：${rawText.slice(0, 120)}`);
            }

            if (!response.ok) {
                throw new Error(result.message || `HTTP ${response.status}`);
            }

            if (result.result !== "success") {
                throw new Error(result.message || "伺服器回傳失敗");
            }

            return result;
        }

        // ================= 登入驗證 =================
        window.onload = () => {
            document.getElementById('login-modal').classList.add('active');
            document.getElementById('student-id-input').focus();
        };

        document.getElementById('student-id-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.verifyLogin();
        });

        window.verifyLogin = () => {
            const input = document.getElementById('student-id-input').value.trim().toUpperCase();
            const errorMsg = document.getElementById('login-error');
            
            const regex = /^P[1-6][A-F](0[1-9]|[1-3][0-9]|40)$/i;
            
            if (regex.test(input)) {
                studentId = input;
                document.getElementById('display-student-id').innerText = studentId;
                document.getElementById('student-badge').style.display = 'block';
                document.getElementById('login-modal').classList.remove('active');
                errorMsg.innerText = "";
            } else {
                errorMsg.innerText = "格式錯誤！請輸入正確格式，如：P6A02";
            }
        };

        // ================= 動畫掉落邏輯 =================
        function gameLoop() {
            if (!isPlaying || !currentModeIsFalling) return;
            
            let progress = (selectedTime - timeLeft) / selectedTime;
            // 速度再調慢 20%：讓小學生有更充裕的反應時間
            let speed = (0.7 + progress * 1.8) * 0.8; 
            
            fallingY += speed;
            const fallingEl = document.getElementById('the-falling-letter');
            fallingEl.style.top = fallingY + 'px';

            // 掉到底部邊界判定 (掉落框高400px，字母約80px，所以底線是320)
            if (fallingY > 320) {
                currentScore -= 1; // 掉到地上只扣 1 分
                document.getElementById('score').innerText = currentScore;
                
                const feedbackElement = document.getElementById('feedback');
                feedbackElement.innerText = "💦 掉下去了！ (-1)";
                feedbackElement.className = "feedback wrong";
                void feedbackElement.offsetWidth;
                
                nextImage();
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ================= 遊戲核心 =================
        window.startGame = (categoryId) => {
            currentModeId = categoryId;
            selectedTime = parseInt(document.getElementById('time-select').value);
            currentPracticeMode = document.getElementById('practice-mode-select').value;
            
            const category = categoryMap[categoryId];
            currentModeIsText = category.isTextMode === true;
            currentModeIsFalling = category.isFallingMode === true;
            currentImageList = [];

            // 切換顯示介面
            document.getElementById('char-display').classList.add('hidden');
            document.getElementById('image-display').classList.add('hidden');
            document.getElementById('falling-container').classList.add('hidden');
            document.getElementById('keyboard-layout').classList.add('hidden');

            if (currentModeIsFalling) {
                currentImageList = category.letters; 
                document.getElementById('hint-text').innerText = `💡 參考下方亮起的鍵盤與雙手，按出正確字母`;
                document.getElementById('falling-container').classList.remove('hidden');
                document.getElementById('keyboard-layout').classList.remove('hidden'); // 顯示動態雙手鍵盤
            } else if (currentModeIsText) {
                currentImageList = [...cangjieMap];
                document.getElementById('hint-text').innerText = `💡 請輸入上方字根對應的英文字母`;
                document.getElementById('char-display').classList.remove('hidden');
            } else {
                const currentValidLetters = category.letters;
                currentValidLetters.forEach(letter => {
                    const limit = counts[letter];
                    const folder = getFolderName(letter); 
                    for (let i = 1; i <= limit; i++) {
                        currentImageList.push({ key: letter, index: i, folder: folder });
                    }
                });
                
                const hintStart = currentValidLetters[0].toUpperCase();
                const hintEnd = currentValidLetters[currentValidLetters.length - 1].toUpperCase();
                document.getElementById('hint-text').innerText = `💡 請輸入圖片對應的英文字母 (範圍：${hintStart} - ${hintEnd})`;
                document.getElementById('image-display').classList.remove('hidden');
            }

            if (currentImageList.length === 0) return alert("找不到對應的題目設定！");

            currentScore = 0; isPlaying = true; timeLeft = selectedTime;
            document.getElementById('category-title').innerText = category.title;
            document.getElementById('score').innerText = currentScore;
            
            const feedbackElement = document.getElementById('feedback');
            feedbackElement.innerText = "準備開始！"; feedbackElement.className = "feedback"; 
            document.getElementById('timer').classList.remove('timer-red'); 
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            mobileInput.value = ''; mobileInput.focus();

            updateTimerUI(); nextImage();

            timerInterval = setInterval(() => {
                timeLeft--; updateTimerUI();
                if (timeLeft <= 0) triggerGameOver();
            }, 1000);

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (currentModeIsFalling) {
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        };

        function nextImage() {
            if (!isPlaying || currentImageList.length === 0) return;
            
            // 清除舊的發亮效果 (鍵盤 + 手指)
            document.querySelectorAll('.active-key').forEach(el => el.classList.remove('active-key'));
            document.querySelectorAll('.active-finger').forEach(el => el.classList.remove('active-finger'));

            if (currentModeIsFalling) {
                const letters = categoryMap['english'].letters;
                currentTargetKey = letters[Math.floor(Math.random() * letters.length)];
                fallingY = 0; 
                
                const fallingEl = document.getElementById('the-falling-letter');
                fallingEl.innerText = currentTargetKey.toUpperCase();
                fallingEl.style.left = Math.floor(Math.random() * 80 + 10) + '%'; 
                fallingEl.style.top = fallingY + 'px';
                currentErrorCount = 0;

                // 1. 讓虛擬鍵盤對應按鍵發亮
                const targetKeyElement = document.getElementById('key-' + currentTargetKey.toLowerCase());
                if(targetKeyElement) targetKeyElement.classList.add('active-key');

                // 2. 讓對應的手指發亮
                const fingerId = fingerMapping[currentTargetKey.toLowerCase()];
                if(fingerId) {
                    const targetFingerElement = document.getElementById('finger-' + fingerId);
                    if(targetFingerElement) targetFingerElement.classList.add('active-finger');
                }

            } else {
                const randomItem = currentImageList[Math.floor(Math.random() * currentImageList.length)];
                if (currentModeIsText) {
                    document.getElementById('char-display').innerText = randomItem.char;
                    currentTargetKey = randomItem.key;
                } else {
                    const imgElement = document.getElementById('image-display');
                    imgElement.onerror = null; 
                    imgElement.src = `PIC/${randomItem.folder}/${randomItem.key} (${randomItem.index}).png`;
                    currentTargetKey = randomItem.key;
                }
                currentErrorCount = 0;
            }
        }

        function updateTimerUI() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerElement = document.getElementById('timer');
            timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 10 && timeLeft > 0) timerElement.classList.add('timer-red');
            else timerElement.classList.remove('timer-red');
        }

        function processInput(keyPressed) {
            const feedbackElement = document.getElementById('feedback');
            feedbackElement.classList.remove('correct', 'wrong');
            void feedbackElement.offsetWidth; 
            
            if (keyPressed === currentTargetKey) {
                currentScore += 1;
                feedbackElement.innerText = "🌟 答對了！ (+1)";
                feedbackElement.classList.add('correct');
                nextImage(); 
            } else {
                currentScore -= 2;
                currentErrorCount += 1;
                
                if (currentErrorCount >= 3) {
                    feedbackElement.innerText = "💦 錯滿 3 次，自動跳過 (-2)";
                    feedbackElement.classList.add('wrong');
                    nextImage(); 
                } else {
                    feedbackElement.innerText = `💦 哎呀，錯了 (-2) (已錯 ${currentErrorCount}/3 次)`;
                    feedbackElement.classList.add('wrong');
                }
            }
            document.getElementById('score').innerText = currentScore;
        }

        window.addEventListener('keydown', (event) => {
            if (!isPlaying || event.repeat) return;
            if (event.target.id === 'mobile-input') return;
            const keyPressed = event.key.toLowerCase();
            if (/^[a-z]$/.test(keyPressed)) processInput(keyPressed);
        });

        mobileInput.addEventListener('keydown', (event) => { if (event.repeat) event.preventDefault(); });
        mobileInput.addEventListener('input', (event) => {
            if (!isPlaying) return;
            const keyPressed = event.data ? event.data.toLowerCase() : "";
            mobileInput.value = ''; 
            if (keyPressed && /^[a-z]$/.test(keyPressed)) processInput(keyPressed);
        });
        document.getElementById('game-screen').addEventListener('click', () => { if (isPlaying) mobileInput.focus(); });

        window.returnToMenu = () => {
            isPlaying = false; 
            clearInterval(timerInterval);
            if (animationFrameId) cancelAnimationFrame(animationFrameId); 
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        };

        // ================= Google 表格連線：上傳成績 =================
        async function triggerGameOver() {
            isPlaying = false; 
            clearInterval(timerInterval); 
            if (animationFrameId) cancelAnimationFrame(animationFrameId); 
            mobileInput.blur(); 
            
            document.getElementById('final-score').innerText = currentScore;
            const saveStatus = document.getElementById('save-status');
            document.getElementById('game-over-modal').classList.add('active');

            if (currentPracticeMode === "test") {
                if (isPlaceholderUrl(TEST_SCORE_APP_SCRIPT_URL)) {
                    saveStatus.innerText = "尚未設定測驗模式 Google 表格網址，無法上傳！";
                    saveStatus.style.color = "var(--danger-color)";
                    return;
                }

                saveStatus.innerText = "正在上傳測驗成績至 Google 試算表...";
                saveStatus.style.color = "var(--text-light)";

                try {
                    const result = await postToAppScript(TEST_SCORE_APP_SCRIPT_URL, {
                        studentId,
                        score: currentScore,
                        mode: categoryMap[currentModeId].title,
                        time: selectedTime
                    });

                    if (result.result === "success") {
                        saveStatus.innerText = "✅ 測驗成績已成功上傳至 Google 試算表！";
                        saveStatus.style.color = "var(--success-color)";
                    }
                } catch (e) {
                    console.error("測驗成績儲存失敗", e);
                    saveStatus.innerText = `⚠️ 測驗成績上傳失敗：${e.message}`;
                    saveStatus.style.color = "var(--danger-color)";
                }
                return;
            }
            
            if (isPlaceholderUrl(LEADERBOARD_APP_SCRIPT_URL)) {
                saveStatus.innerText = "尚未設定 Google 表格網址，無法上傳！";
                saveStatus.style.color = "var(--danger-color)";
                return;
            }

            if (currentScore > 0) {
                saveStatus.innerText = "正在上傳成績至 Google 表格龍虎榜...";
                saveStatus.style.color = "var(--text-light)";

                try {
                    const result = await postToAppScript(LEADERBOARD_APP_SCRIPT_URL, {
                        studentId,
                        score: currentScore,
                        mode: categoryMap[currentModeId].title,
                        time: selectedTime
                    });
                    
                    if(result.result === "success") {
                        saveStatus.innerText = "✅ 成績已成功上傳至龍虎榜！";
                        saveStatus.style.color = "var(--success-color)";
                    }
                } catch (e) {
                    console.error("儲存失敗", e);
                    saveStatus.innerText = `⚠️ 上傳失敗：${e.message}`;
                    saveStatus.style.color = "var(--danger-color)";
                }
            } else {
                saveStatus.innerText = "本次分數太低，沒有進入龍虎榜，再接再厲！";
                saveStatus.style.color = "var(--text-light)";
            }
        }

        window.closeGameOver = () => {
            document.getElementById('game-over-modal').classList.remove('active');
            window.returnToMenu();
        };

        // ================= Google 表格連線：讀取龍虎榜 =================
        window.openLeaderboard = () => {
            document.getElementById('leaderboard-modal').classList.add('active');
            document.getElementById('lb-time-select').value = document.getElementById('time-select').value;
            window.loadLeaderboard();
        };

        window.closeLeaderboard = () => {
            document.getElementById('leaderboard-modal').classList.remove('active');
        };

        window.loadLeaderboard = async () => {
            const tableBody = document.getElementById('leaderboard-body');
            const loading = document.getElementById('lb-loading');
            
            tableBody.innerHTML = "";
            loading.style.display = "block";
            loading.innerText = "正在從 Google 表格抓取最新排名...";

            if (isPlaceholderUrl(LEADERBOARD_APP_SCRIPT_URL)) {
                loading.innerText = "尚未設定 Google 表格網址，無法讀取資料。";
                return;
            }

            const targetMode = document.getElementById('lb-mode-select').value;
            const targetTime = parseInt(document.getElementById('lb-time-select').value);

            try {
                const fetchUrl = `${LEADERBOARD_APP_SCRIPT_URL}?mode=${encodeURIComponent(targetMode)}&time=${targetTime}`;
                const response = await fetch(fetchUrl);
                const sortedScores = await response.json();

                loading.style.display = "none";

                if (sortedScores.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan=\"3\" style=\"color: var(--text-light); padding: 30px;\">目前這個模式還沒有人挑戰喔，趕快來當第一名！</td></tr>`;
                    return;
                }

                sortedScores.forEach((data, index) => {
                    const rank = index + 1;
                    const tr = document.createElement('tr');
                    if (rank <= 3) tr.classList.add(`rank-${rank}`);
                    
                    let rankDisplay = rank;
                    if (rank === 1) rankDisplay = '🥇 1';
                    if (rank === 2) rankDisplay = '🥈 2';
                    if (rank === 3) rankDisplay = '🥉 3';

                    tr.innerHTML = `
                        <td>${rankDisplay}</td>
                        <td>${data.studentId}</td>
                        <td style=\"color: var(--success-color);\">${data.score}</td>
                    `;
                    tableBody.appendChild(tr);
                });

            } catch (error) {
                console.error("讀取排行榜失敗", error);
                loading.innerText = "無法載入排行榜，請稍後再試或檢查網址。";
            }
        };

    </script>
</body>
</html>
